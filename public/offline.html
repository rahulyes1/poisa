<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D1117" />
    <title>Poisa Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 10%, rgba(0, 200, 150, 0.12), transparent 35%), #0d1117;
        color: #e6edf3;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #2a3345;
        background: #161b22;
        border-radius: 16px;
        padding: 22px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        color: #00c896;
      }
      p {
        margin: 10px 0 0;
        font-size: 14px;
        color: #a7b1c2;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Poisa</h1>
      <p>You’re offline. Last cached shell is available.</p>
    </main>
  </body>
</html>
